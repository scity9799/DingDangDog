<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>멍! 케어 상세페이지</title>
    <link rel="stylesheet" href="/assets/css/dogcare/dogcare_detail.css" />
  </head>
  <body>
    <header>header</header>
    <main>
      <div class="dogcare-main-container">
        <div class="main-header">
          <div class="main-header-title">멍! 케어</div>
        </div>
        <!-- 페이지 컨텐츠 -->
        <div class="main-content">
          <div class="content-header">멍! 케어 일정 등록</div>
          <div class="dogcare-write-container">
            <div class="write-title">제목</div>
            <div class="wirte-box-container">
              <div
                class="title-write-box"
                placeholder="제목을 작성하세요"
              ></div>
              <div class="dogcare-date">
                <label for="dogcare-date">일정</label>
                <input
                  type="date"
                  id="dagcate-date"
                  data-placeholder="날짜 선택"
                />
              </div>
            </div>
            <div class="write-info-caredate">봉사 날짜 | 2026.03.20</div>
            <div class="write-main-container">
              3월 20일 저희와 함께 봉사 해 주실 분을 찾습니다<br />
              위치는 경기도 파주에 위치한 행복보호소 입니다<br />
            </div>
            <div class="detail-footer-container">
              <button class="apply-status">신청현황 12/15</button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer>footer</footer>
  </body>
</html>
